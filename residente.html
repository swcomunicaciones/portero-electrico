<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hay visita!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    :root {
      --bg: #0f1117; --surface: #1a1d27; --accent: #4f8ef7;
      --accent2: #38d9a9; --danger: #ff6b6b; --text: #e8eaf0;
      --text-muted: #7a7f9a; --border: #2e3250; --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 40px 28px; width: 100%;
      max-width: 380px; text-align: center;
    }

    .bell { font-size: 4rem; display: block; margin-bottom: 20px; animation: ring 0.6s infinite alternate; }
    @keyframes ring { from{transform:rotate(-16deg)} to{transform:rotate(16deg)} }

    .building { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .depto { display: inline-block; background: rgba(79,142,247,0.15); border: 1px solid rgba(79,142,247,0.3); color: var(--accent); font-size: 0.85rem; font-weight: 700; padding: 5px 16px; border-radius: 20px; margin: 10px 0 24px; }
    .subtitle { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 28px; line-height: 1.5; }

    .btn-answer {
      width: 100%; background: var(--accent2); color: #0f1117;
      border: none; border-radius: 14px; padding: 16px;
      font-size: 1.05rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.18s; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-answer:hover { opacity: 0.88; }

    .btn-reject {
      width: 100%; background: transparent; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 14px; padding: 13px;
      font-size: 0.88rem; cursor: pointer; transition: border-color 0.18s;
    }
    .btn-reject:hover { border-color: var(--danger); color: var(--danger); }

    /* Pantalla de videollamada */
    #call-screen {
      display: none; position: fixed; inset: 0; background: var(--bg);
      flex-direction: column; z-index: 100;
    }
    #call-screen.active { display: flex; }
    #jitsi-container { flex: 1; width: 100%; }
    .hangup-bar { padding: 12px 20px; background: var(--surface); border-top: 1px solid var(--border); }
    .btn-hangup {
      width: 100%; background: var(--danger); color: white;
      border: none; border-radius: 12px; padding: 13px;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
    }

    /* Loading */
    #loading { display: none; flex-direction: column; align-items: center; gap: 14px; }
    #loading.active { display: flex; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.82rem; color: var(--text-muted); }
  </style>
</head>
<body>

<!-- Pantalla de aviso -->
<div class="card" id="main-card">
  <span class="bell">🔔</span>
  <div class="building" id="building-name">EDIFICIO EL ACUERDO</div>
  <h1>¡Hay visita!</h1>
  <div class="depto" id="depto-label">Depto —</div>
  <p class="subtitle">Alguien está esperando en la puerta.<br>¿Querés atender la videollamada?</p>

  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Conectando videollamada...</div>
  </div>

  <div id="buttons">
    <button class="btn-answer" onclick="answerCall()">📹 Atender videollamada</button>
    <button class="btn-reject" onclick="rejectCall()">Ignorar</button>
  </div>
</div>

<!-- Pantalla de videollamada fullscreen -->
<div id="call-screen">
  <div id="jitsi-container"></div>
  <div class="hangup-bar">
    <button class="btn-hangup" onclick="hangup()">✕ Colgar</button>
  </div>
</div>

<script src="https://meet.jit.si/external_api.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDXJRaFIR8K7XvYuwqg-_t-PqF__vxw1Z0",
    authDomain: "portero-electrico-f9e63.firebaseapp.com",
    databaseURL: "https://portero-electrico-f9e63-default-rtdb.firebaseio.com",
    projectId: "portero-electrico-f9e63",
    storageBucket: "portero-electrico-f9e63.firebasestorage.app",
    messagingSenderId: "900720232104",
    appId: "1:900720232104:web:c9e6d10b13b4d2ef4fa49d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const params = new URLSearchParams(window.location.search);
  const depto = params.get('depto') || '—';
  const room = params.get('room') || `ElAcuerdo${depto}`;

  document.getElementById('depto-label').textContent = `Depto ${depto}`;

  // Cargar nombre del edificio
  try {
    const snap = await get(ref(db, 'portero/buildingName'));
    if (snap.exists()) document.getElementById('building-name').textContent = snap.val();
  } catch(e) {}

  let jitsiApi = null;

  window.answerCall = function() {
    document.getElementById('buttons').style.display = 'none';
    document.getElementById('loading').classList.add('active');

    setTimeout(() => {
      document.getElementById('loading').classList.remove('active');
      document.getElementById('main-card').style.display = 'none';
      document.getElementById('call-screen').classList.add('active');

      const container = document.getElementById('jitsi-container');
      container.innerHTML = '';

      jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", {
        roomName: room,
        width: "100%",
        height: "100%",
        parentNode: container,
        configOverwrite: {
          prejoinPageEnabled: false,
          startWithVideoMuted: false,
          startWithAudioMuted: false,
          disableDeepLinking: true,
        },
        interfaceConfigOverwrite: {
          SHOW_JITSI_WATERMARK: false,
          TOOLBAR_BUTTONS: ['microphone', 'camera', 'hangup'],
        },
        userInfo: { displayName: `Depto ${depto}` }
      });

      jitsiApi.addEventListener('readyToClose', () => hangup());
    }, 800);
  }

  window.rejectCall = function() {
    window.close();
    // Si no cierra (algunos navegadores bloquean), mostrar mensaje
    document.getElementById('main-card').innerHTML = `
      <span style="font-size:2.5rem">👋</span>
      <p style="margin-top:16px;color:var(--text-muted);font-size:0.88rem">Llamada ignorada.<br>Podés cerrar esta ventana.</p>
    `;
  }

  window.hangup = function() {
    if (jitsiApi) { jitsiApi.dispose(); jitsiApi = null; }
    document.getElementById('call-screen').classList.remove('active');
    document.getElementById('main-card').style.display = 'block';
    document.getElementById('buttons').style.display = 'block';
    document.getElementById('jitsi-container').innerHTML = '';
  }
</script>
</body>
</html>
